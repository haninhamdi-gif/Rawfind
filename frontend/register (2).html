{% extends "base.html" %}
{% block title %}Inscription — RawFind Tunisia{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">Raw<span>Find</span></div>
    <div class="auth-title">Créer un compte</div>
    <p class="auth-sub">Inscrivez-vous avec votre email pour accéder au score qualité, aux Suggestions et à l'Analyse Comparative BI.</p>
    <form method="POST" action="{{ url_for('register_page') }}">
      <div class="form-group">
        <label class="form-label">Nom d'utilisateur</label>
        <input class="form-input" type="text" name="username" placeholder="Ahmed Ben Ali" required>
      </div>
      <div class="form-group">
        <label class="form-label">Adresse email</label>
        <input class="form-input" type="email" name="email" placeholder="vous@exemple.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input class="form-input" type="password" name="password" placeholder="Minimum 4 caractères" required>
      </div>
      <button type="submit" class="form-submit">Créer mon compte</button>
    </form>
    <div class="auth-switch">Déjà inscrit ? <a href="{{ url_for('login_page') }}">Se connecter</a></div>
  </div>
</div>
{% endblock %}
